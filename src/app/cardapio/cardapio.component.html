<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Cardápio</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-card *ngFor="let produto of listaProdutosLocal" class="produto-card">
    <ion-card-header>
      <ion-card-title>{{ produto.nome }}</ion-card-title>
      <ion-card-subtitle>{{ produto.categoria }}</ion-card-subtitle>
    </ion-card-header>

    <ion-card-content>
      <p class="preco">R$ {{ produto.preco | number:'1.2-2' }}</p>

      <ion-button expand="block" (click)="adicionarProduto(produto)">
        <ion-icon slot="start" name="add-circle-outline"></ion-icon>
        Adicionar
      </ion-button>
    </ion-card-content>
  </ion-card>
</ion-content>
